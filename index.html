<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A3 Problem-Solving Report | Patry AI Fellowship</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#FFFFFF}
body{font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;color:#2B2B2B;-webkit-font-smoothing:antialiased}
 
/* ---------- Toolbar (sticky, dark) ---------- */
.toolbar{position:sticky;top:0;z-index:100;background:#1A1A1A;padding:10px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.toolbar-left{display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:14px}
.brand-mark{width:32px;height:32px;background:#2B2B2B;color:#FFF;font-family:'Arial Black','Arial',sans-serif;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{color:#FFF;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.brand-name .sub{color:#BFBFBF;font-weight:400;margin-left:8px}
.progress-wrap{display:flex;align-items:center;gap:10px}
.progress-label{color:#BFBFBF;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.progress-bar{width:120px;height:3px;background:rgba(255,255,255,.12);overflow:hidden}
.progress-fill{height:100%;background:#FFFFFF;transition:width .4s ease}
.progress-fill.complete{background:#FFFFFF}
.progress-pct{color:#FFFFFF;font-family:'Arial Black','Arial',sans-serif;font-size:11px;letter-spacing:1px}
 
/* ---------- Header (cover style) ---------- */
.header{background:#1A1A1A;padding:48px 32px 40px}
.header-inner{max-width:1400px;margin:0 auto}
.header-kicker{font-size:10px;color:#BFBFBF;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
.header h1{font-family:'Arial Black','Arial',sans-serif;font-size:44px;font-weight:900;color:#FFFFFF;letter-spacing:-.5px;line-height:1.05;margin-bottom:14px}
.header .lede{font-size:16px;color:#BFBFBF;line-height:1.5;max-width:780px}
.header-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.1);margin-top:36px;border-top:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1)}
.meta-cell{background:#1A1A1A;padding:14px 18px}
.meta-cell .label{font-size:9px;color:#BFBFBF;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.meta-cell .value{font-size:14px;color:#FFFFFF;font-weight:700;line-height:1.3;min-height:18px}
.meta-cell .value.empty{color:#9A9A9A;font-weight:400;font-style:italic}
.status-row{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:18px 0 0}
.status-row .label{font-size:10px;color:#BFBFBF;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.status-btn{padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:transparent;color:#6B6B6B;border:1px solid #2B2B2B}
.status-btn.active{background:#FFFFFF;color:#1A1A1A;border-color:#FFFFFF}
 
/* ---------- ROI band ---------- */
.roi-band{background:#FFFFFF;border-bottom:1px solid #E5E5E5}
.roi-inner{max-width:1400px;margin:0 auto;padding:36px 32px}
.roi-kicker{font-size:10px;color:#6B6B6B;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}
.roi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-left:1px solid #E5E5E5}
.roi-card{padding:14px 24px;border-right:1px solid #E5E5E5}
.roi-card .roi-card-label{font-size:9px;color:#6B6B6B;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.roi-card .roi-card-value{font-family:'Arial Black','Arial',sans-serif;font-size:28px;font-weight:900;color:#2B2B2B;line-height:1.1;letter-spacing:-.5px}
.roi-card .roi-card-value.empty{font-family:Arial,sans-serif;font-size:13px;font-weight:400;color:#BFBFBF;font-style:italic;letter-spacing:0}
 
/* ---------- Content columns ---------- */
.content{max-width:1400px;margin:0 auto;padding:48px 32px 64px}
.col-headers{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:24px}
.col-header{font-size:10px;font-weight:700;color:#6B6B6B;letter-spacing:3px;text-transform:uppercase;padding:0 0 14px;border-bottom:1px solid #2B2B2B}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:24px 32px;align-items:start}
.column{display:flex;flex-direction:column;gap:24px}
 
/* ---------- Card ---------- */
.card{background:#FFFFFF;border:1px solid #E5E5E5}
.card-header{display:flex;align-items:flex-start;gap:14px;padding:18px 22px;border-bottom:1px solid #E5E5E5;background:#FFFFFF}
.card-num{width:32px;height:32px;background:#2B2B2B;color:#FFFFFF;font-family:'Arial Black','Arial',sans-serif;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-num.filled{background:#1A1A1A}
.card-headtext{flex:1;min-width:0}
.card-eyebrow{font-size:9px;color:#6B6B6B;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.card-title{font-family:'Arial Black','Arial',sans-serif;font-size:16px;font-weight:900;color:#2B2B2B;line-height:1.25;letter-spacing:-.2px}
.card-subtitle{font-size:11px;color:#6B6B6B;margin-top:4px;line-height:1.4}
.card-status{width:8px;height:8px;background:#E5E5E5;flex-shrink:0;margin-top:6px}
.card-status.filled{background:#2B2B2B}
.card-body{padding:20px 22px;font-size:14px;line-height:1.7;color:#2B2B2B;white-space:pre-wrap;min-height:80px}
.card-body.placeholder{color:#BFBFBF;font-size:13px;line-height:1.7}
 
/* ---------- Footer ---------- */
.footer{background:#1A1A1A;padding:18px 32px;margin-top:0}
.footer-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap}
.footer-left{font-size:10px;color:#6B6B6B;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.footer-left .sep{color:#2B2B2B;margin:0 12px}
.footer-right{font-size:10px;color:#BFBFBF;font-weight:400;letter-spacing:1px}
 
@media (max-width:900px){
  .header h1{font-size:32px}
  .header-meta{grid-template-columns:repeat(2,1fr)}
  .roi-grid{grid-template-columns:repeat(2,1fr)}
  .columns,.col-headers{grid-template-columns:1fr}
  .col-headers{display:flex;flex-direction:column;gap:0}
}
</style>
</head>
<body>
 
<div class="toolbar" id="toolbar">
  <div class="toolbar-left">
    <div class="brand">
      <div class="brand-mark">P</div>
      <div class="brand-name">Patry Group<span class="sub">AI Fellowship 2026</span></div>
    </div>
  </div>
  <div class="progress-wrap">
    <span class="progress-label">Completion</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>
</div>
 
<div class="header" id="header">
  <div class="header-inner">
    <div class="header-kicker">A3 Problem-Solving Report</div>
    <h1 id="headerTitle">[Project title.]</h1>
    <div class="lede">Think left, act right. Understand the problem before proposing the solution.</div>
    <div class="header-meta" id="metaGrid"></div>
    <div class="status-row" id="statusRow"></div>
  </div>
</div>
 
<div class="roi-band">
  <div class="roi-inner">
    <div class="roi-kicker">ROI Estimate</div>
    <div class="roi-grid" id="roiGrid"></div>
  </div>
</div>
 
<div class="content" id="content">
  <div class="col-headers">
    <div class="col-header">Problem Understanding</div>
    <div class="col-header">Solution &amp; Execution</div>
  </div>
  <div class="columns">
    <div class="column" id="colLeft"></div>
    <div class="column" id="colRight"></div>
  </div>
</div>
 
<div class="footer">
  <div class="footer-inner">
    <span class="footer-left">A3 Report<span class="sep">|</span>AI Fellowship 2026<span class="sep">|</span>Continuous Improvement</span>
    <span class="footer-right">Patry Inc.</span>
  </div>
</div>
 
<script>
var SECTIONS_LEFT = ["1_background","2_current_condition","3_goal","4_root_cause"];
var SECTIONS_RIGHT = ["5_countermeasures","6_implementation","7_followup"];
var PLACEHOLDERS = {
  "1_background": "Which division or process area does this impact?\nWhat is the business context: volume, stakeholders, urgency?\nWhy is this being addressed now?\nHow does it connect to Patry\u2019s AI mandate?",
  "2_current_condition": "Describe the current workflow step by step\nHow long does it take? How many people are involved?\nWhere do errors, delays, or rework happen?\nWhat data do you have? (hours/week, error rates, volume)",
  "3_goal": "State the measurable outcome\nBy when? Set a clear deadline\nWhat does the improved process look like?\nHow will you know you\u2019ve succeeded? (metric + threshold)",
  "4_root_cause": "What is the root cause, not just the symptom?\nUse 5-Whys, fishbone, or process mapping\nWhich causes are within your control?\nWhat have you ruled out?",
  "5_countermeasures": "Describe your AI / automation solution\nWhich root cause(s) does it address?\nWhat tools will you use? (n8n, Claude, etc.)\nWhat alternatives did you consider?\nWhat are the risks or assumptions?",
  "6_implementation": "Break the project into 3 to 5 milestones with dates\nWho owns each milestone?\nWhat resources or approvals are needed?\nWhat are the dependencies or blockers?",
  "7_followup": "What metrics will you track post-implementation?\nBefore vs. after comparison\nWhat worked? What didn\u2019t?\nLessons learned and next steps"
};
var STATUS_LABELS = {proposal:"Proposal", in_progress:"In Progress", complete:"Complete"};
 
var INLINE_DATA = {"project_title": "", "owner": "", "division": "", "date": "", "status": "proposal", "roi": {"revenue_impact": "", "cost_savings": "", "hours_saved": "", "capacity_impact": ""}, "sections": {"1_background": {"title": "Background / Context", "subtitle": "Why does this project exist? Who is affected?", "content": ""}, "2_current_condition": {"title": "Current Condition", "subtitle": "How does the process work today? Use data, not opinions.", "content": ""}, "3_goal": {"title": "Goal / Target Condition", "subtitle": "What does 'done' look like? Be specific and measurable.", "content": ""}, "4_root_cause": {"title": "Root Cause Analysis", "subtitle": "Why does the problem exist? Ask 'why' five times.", "content": ""}, "5_countermeasures": {"title": "Countermeasures / Proposed Solution", "subtitle": "What are you building? How does it address the root cause?", "content": ""}, "6_implementation": {"title": "Implementation Plan", "subtitle": "Milestones, owners, and dates. Who does what by when?", "content": ""}, "7_followup": {"title": "Follow-Up & Verification", "subtitle": "Did it work? What did you learn? What's next?", "content": ""}}};
 
function escapeHtml(str) {
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}
 
function renderHeader(data) {
  var titleEl = document.getElementById("headerTitle");
  titleEl.textContent = data.project_title || "[Project title.]";
}
 
function renderMeta(data) {
  var grid = document.getElementById("metaGrid");
  var fields = [
    {label:"Owner / Team", key:"owner"},
    {label:"Division", key:"division"},
    {label:"Date", key:"date"},
    {label:"Cohort", key:"_cohort", fixed:"AI Fellowship 2026"}
  ];
  var h = "";
  fields.forEach(function(f) {
    var val = f.fixed || data[f.key] || "";
    var cls = val ? "" : " empty";
    var display = val || "Not set";
    h += '<div class="meta-cell">';
    h += '<div class="label">' + f.label + '</div>';
    h += '<div class="value' + cls + '">' + escapeHtml(display) + '</div>';
    h += '</div>';
  });
  grid.innerHTML = h;
}
 
function renderStatus(data) {
  var row = document.getElementById("statusRow");
  var h = '<span class="label">Status</span>';
  Object.keys(STATUS_LABELS).forEach(function(k) {
    var active = data.status === k ? " active" : "";
    h += '<span class="status-btn' + active + '">' + STATUS_LABELS[k] + '</span>';
  });
  row.innerHTML = h;
}
 
function renderCard(key, sec) {
  var num = key.split("_")[0];
  var hasContent = sec.content && sec.content.trim().length > 0;
  var dotClass = hasContent ? " filled" : "";
  var numClass = hasContent ? " filled" : "";
  var bodyHtml;
  if (hasContent) {
    bodyHtml = '<div class="card-body">' + escapeHtml(sec.content) + '</div>';
  } else {
    bodyHtml = '<div class="card-body placeholder">' + (PLACEHOLDERS[key] || "Not yet completed") + '</div>';
  }
  return '<div class="card">' +
    '<div class="card-header">' +
      '<div class="card-num' + numClass + '">' + num + '</div>' +
      '<div class="card-headtext">' +
        '<div class="card-eyebrow">Step 0' + num + '</div>' +
        '<div class="card-title">' + escapeHtml(sec.title) + '</div>' +
        '<div class="card-subtitle">' + escapeHtml(sec.subtitle) + '</div>' +
      '</div>' +
      '<div class="card-status' + dotClass + '"></div>' +
    '</div>' + bodyHtml + '</div>';
}
 
function renderSections(data) {
  var left = document.getElementById("colLeft");
  var right = document.getElementById("colRight");
  left.innerHTML = "";
  right.innerHTML = "";
  SECTIONS_LEFT.forEach(function(k) { if (data.sections[k]) left.innerHTML += renderCard(k, data.sections[k]); });
  SECTIONS_RIGHT.forEach(function(k) { if (data.sections[k]) right.innerHTML += renderCard(k, data.sections[k]); });
}
 
function updateProgress(data) {
  var sectionKeys = SECTIONS_LEFT.concat(SECTIONS_RIGHT);
  var filledSections = sectionKeys.filter(function(k) { return data.sections[k] && data.sections[k].content && data.sections[k].content.trim().length > 0; }).length;
  var headerFields = ["project_title","owner","division","date"].filter(function(k) { return data[k] && data[k].trim().length > 0; }).length;
  var pct = Math.round(((filledSections + headerFields) / 11) * 100);
  var fill = document.getElementById("progressFill");
  fill.style.width = pct + "%";
  if (pct === 100) fill.classList.add("complete"); else fill.classList.remove("complete");
  document.getElementById("progressPct").textContent = pct + "%";
}
 
function renderROI(data) {
  var grid = document.getElementById("roiGrid");
  var roi = data.roi || {};
  var fields = [
    {key:"revenue_impact", label:"Revenue Impact", placeholder:"e.g. $50k/yr"},
    {key:"cost_savings", label:"Cost Savings", placeholder:"e.g. $25k/yr"},
    {key:"hours_saved", label:"Hours Saved", placeholder:"e.g. 8 hrs/wk"},
    {key:"capacity_impact", label:"Capacity Impact", placeholder:"e.g. 50 to 500 / wk"}
  ];
  var h = "";
  fields.forEach(function(f) {
    var val = roi[f.key] || "";
    if (val) {
      h += '<div class="roi-card"><div class="roi-card-label">' + f.label + '</div><div class="roi-card-value">' + escapeHtml(val) + '</div></div>';
    } else {
      h += '<div class="roi-card"><div class="roi-card-label">' + f.label + '</div><div class="roi-card-value empty">' + f.placeholder + '</div></div>';
    }
  });
  grid.innerHTML = h;
}
 
function renderAll(data) {
  document.title = (data.project_title || "A3 Report") + " | Patry AI Fellowship";
  renderHeader(data);
  renderMeta(data);
  renderStatus(data);
  renderROI(data);
  renderSections(data);
  updateProgress(data);
}
 
// Load data: use fetch when hosted, inline data when opened from file://
if (window.location.protocol === "file:") {
  renderAll(INLINE_DATA);
} else {
  fetch("a3-data.json")
    .then(function(r) { if (!r.ok) throw new Error("not found"); return r.json(); })
    .then(function(data) { renderAll(data); })
    .catch(function() { renderAll(INLINE_DATA); });
}
</script>
</body>
</html>
