<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A3 Problem-Solving Report — Patry AI Fellowship</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F5F2ED;color:#1A3263}
.toolbar{position:sticky;top:0;z-index:100;background:#1A3263;border-bottom:3px solid #FAB95B;padding:8px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.toolbar-left{display:flex;align-items:center;gap:16px}
.toolbar .logo{height:28px;object-fit:contain}
.progress-wrap{background:rgba(255,255,255,.1);border-radius:20px;padding:3px 12px;display:flex;align-items:center;gap:8px}
.progress-bar{width:80px;height:5px;border-radius:3px;background:rgba(255,255,255,.15);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:#FAB95B;transition:width .4s ease}
.progress-fill.complete{background:#2E7D4F}
.progress-pct{color:rgba(255,255,255,.6);font-size:10px}
.btn{border:none;border-radius:6px;padding:5px 16px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-present{background:#FAB95B;color:#1A3263}
.btn-exit{position:fixed;top:12px;right:16px;z-index:200;background:#1A3263;color:#FAB95B;border-radius:8px;padding:8px 18px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.25);display:none}
.btn-exit.active{display:block}
.header{background:#1A3263;padding:22px 32px 16px;border-bottom:4px solid #FAB95B}
.header.present{padding:28px 40px 20px}
.header-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.header-label{font-size:10px;color:#FAB95B;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.header h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px}
.header.present h1{font-size:26px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.meta-field-label{font-size:10px;color:#FAB95B;font-weight:600;margin-bottom:2px}
.meta-field-value{font-size:13px;color:#fff;font-weight:600;min-height:22px;padding:2px 0}
.meta-field-value.empty{opacity:.3;font-style:italic}
.meta-field.span2{grid-column:1/-1}
.status-wrap{display:flex;align-items:center;gap:6px}
.status-wrap .label{font-size:10px;color:#FAB95B;font-weight:600}
.status-btn{border-radius:4px;padding:3px 10px;font-size:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:rgba(255,255,255,.35);cursor:default}
.status-btn.active-proposal{background:#547792;color:#fff;border:none;font-weight:700}
.status-btn.active-in_progress{background:#FAB95B;color:#1A3263;border:none;font-weight:700}
.status-btn.active-complete{background:#2E7D4F;color:#fff;border:none;font-weight:700}
.content{max-width:1400px;margin:0 auto;padding:16px 24px 40px}
.content.present{padding:20px 40px 40px}
.col-headers{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:12px}
.col-header{font-size:11px;font-weight:700;color:#547792;letter-spacing:3px;text-transform:uppercase;padding:8px 0;border-bottom:2px solid #D4CFCA}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;align-items:start}
.column{display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:8px;border:1px solid #D4CFCA;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #D4CFCA;border-left:4px solid #547792;background:#F5F2ED}
.card-num{width:26px;height:26px;border-radius:50%;background:#547792;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-size:13px;font-weight:700;color:#1A3263;line-height:1.3}
.card-subtitle{font-size:10px;color:#547792;font-style:italic;margin-top:1px}
.card-dot{width:8px;height:8px;border-radius:50%;background:#D4CFCA;flex-shrink:0;margin-left:auto;transition:background .3s}
.card-dot.filled{background:#2E7D4F}
.card-body{padding:12px 16px;font-size:13px;line-height:1.7;color:#1A3263;white-space:pre-wrap;min-height:60px}
.card-body.empty{color:#8C9BAA;font-style:italic}
.card-body.placeholder{color:#B0B8C1;font-size:12px;line-height:1.8}
.footer{background:#1A3263;border-top:3px solid #FAB95B;padding:10px 32px;display:flex;justify-content:space-between;align-items:center}
.roi-bar{max-width:1400px;margin:0 auto;padding:12px 24px 0}
.roi-bar .roi-label{font-size:10px;font-weight:700;color:#547792;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.roi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.roi-card{background:#fff;border:1px solid #D4CFCA;border-radius:8px;padding:12px 16px;border-top:3px solid #FAB95B;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.roi-card .roi-card-label{font-size:10px;color:#547792;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.roi-card .roi-card-value{font-size:18px;font-weight:800;color:#1A3263;line-height:1.3}
.roi-card .roi-card-value.empty{font-size:12px;font-weight:400;color:#B0B8C1;font-style:italic}
.footer-left{font-size:11px;color:#FAB95B}
.footer-right{font-size:11px;color:#E8E2DB;font-style:italic}
</style>
</head>
<body>
<div class="toolbar" id="toolbar">
  <div class="toolbar-left">
    <img class="logo" src="logo.png" alt="Patry Group">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-present" onclick="togglePresent()">&#9654; Present</button>
  </div>
</div>
<button class="btn btn-exit" id="btnExit" onclick="togglePresent()">&#10005; Exit Presentation</button>
<div class="header" id="header">
  <div class="header-inner">
    <div>
      <div class="header-label">Patry AI Fellowship &middot; Summer 2026</div>
      <h1>A3 Problem-Solving Report</h1>
    </div>
    <div class="meta-grid" id="metaGrid"></div>
  </div>
</div>
<div class="roi-bar" id="roiBar">
  <div class="roi-label">ROI Estimate</div>
  <div class="roi-grid" id="roiGrid"></div>
</div>
<div class="content" id="content">
  <div class="col-headers">
    <div class="col-header">Problem Understanding</div>
    <div class="col-header">Solution &amp; Execution</div>
  </div>
  <div class="columns">
    <div class="column" id="colLeft"></div>
    <div class="column" id="colRight"></div>
  </div>
</div>
<div class="footer">
  <span class="footer-left">Patry Inc. &middot; A3 Problem-Solving Template &middot; Continuous Improvement Program</span>
  <span class="footer-right">Think Left &rarr; Act Right &middot; Understand the problem before proposing the solution</span>
</div>
<script>
var SECTIONS_LEFT = ["1_background","2_current_condition","3_goal","4_root_cause"];
var SECTIONS_RIGHT = ["5_countermeasures","6_implementation","7_followup"];
var PLACEHOLDERS = {
  "1_background": "Which division or process area does this impact?\nWhat is the business context — volume, stakeholders, urgency?\nWhy is this being addressed now?\nHow does it connect to Patry\u2019s AI mandate?",
  "2_current_condition": "Describe the current workflow step by step\nHow long does it take? How many people are involved?\nWhere do errors, delays, or rework happen?\nWhat data do you have? (hours/week, error rates, volume)",
  "3_goal": "State the measurable outcome\nBy when? Set a clear deadline\nWhat does the improved process look like?\nHow will you know you\u2019ve succeeded? (metric + threshold)",
  "4_root_cause": "What is the root cause — not just the symptom?\nUse 5-Whys, fishbone, or process mapping\nWhich causes are within your control?\nWhat have you ruled out?",
  "5_countermeasures": "Describe your AI / automation solution\nWhich root cause(s) does it address?\nWhat tools will you use? (n8n, Claude, etc.)\nWhat alternatives did you consider?\nWhat are the risks or assumptions?",
  "6_implementation": "Break the project into 3\u20135 milestones with dates\nWho owns each milestone?\nWhat resources or approvals are needed?\nWhat are the dependencies or blockers?",
  "7_followup": "What metrics will you track post-implementation?\nBefore vs. after comparison\nWhat worked? What didn\u2019t?\nLessons learned and next steps"
};
var STATUS_CLASSES = {proposal:"active-proposal", in_progress:"active-in_progress", complete:"active-complete"};
var STATUS_LABELS = {proposal:"Proposal", in_progress:"In Progress", complete:"Complete"};
var presentMode = false;

var INLINE_DATA = {"project_title": "", "owner": "", "division": "", "date": "", "status": "proposal", "roi": {"revenue_impact": "", "cost_savings": "", "hours_saved": "", "capacity_impact": ""}, "sections": {"1_background": {"title": "Background / Context", "subtitle": "Why does this project exist? Who is affected?", "content": ""}, "2_current_condition": {"title": "Current Condition", "subtitle": "How does the process work today? Use data, not opinions.", "content": ""}, "3_goal": {"title": "Goal / Target Condition", "subtitle": "What does 'done' look like? Be specific and measurable.", "content": ""}, "4_root_cause": {"title": "Root Cause Analysis", "subtitle": "Why does the problem exist? Ask 'why' five times.", "content": ""}, "5_countermeasures": {"title": "Countermeasures / Proposed Solution", "subtitle": "What are you building? How does it address the root cause?", "content": ""}, "6_implementation": {"title": "Implementation Plan", "subtitle": "Milestones, owners, and dates. Who does what by when?", "content": ""}, "7_followup": {"title": "Follow-Up & Verification", "subtitle": "Did it work? What did you learn? What's next?", "content": ""}}};

function togglePresent() {
  presentMode = !presentMode;
  document.getElementById("toolbar").style.display = presentMode ? "none" : "flex";
  document.getElementById("btnExit").classList.toggle("active", presentMode);
  document.getElementById("header").classList.toggle("present", presentMode);
  document.getElementById("content").classList.toggle("present", presentMode);
}

function escapeHtml(str) {
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function renderMeta(data) {
  var grid = document.getElementById("metaGrid");
  var fields = [
    {label:"Project Title", key:"project_title", span:true},
    {label:"Owner / Team", key:"owner"},
    {label:"Division", key:"division"},
    {label:"Date", key:"date"}
  ];
  var h = "";
  fields.forEach(function(f) {
    var val = data[f.key] || "";
    var cls = val ? "" : " empty";
    var display = val || "Not set";
    h += '<div class="meta-field' + (f.span ? " span2" : "") + '">';
    h += '<div class="meta-field-label">' + f.label + '<\/div>';
    h += '<div class="meta-field-value' + cls + '">' + escapeHtml(display) + '<\/div>';
    h += '<\/div>';
  });
  h += '<div class="status-wrap"><span class="label">Status<\/span>';
  Object.keys(STATUS_LABELS).forEach(function(k) {
    var active = data.status === k ? " " + STATUS_CLASSES[k] : "";
    h += '<span class="status-btn' + active + '">' + STATUS_LABELS[k] + '<\/span>';
  });
  h += '<\/div>';
  grid.innerHTML = h;
}

function renderCard(key, sec) {
  var num = key.split("_")[0];
  var hasContent = sec.content && sec.content.trim().length > 0;
  var dotClass = hasContent ? " filled" : "";
  var bodyHtml;
  if (hasContent) {
    bodyHtml = '<div class="card-body">' + escapeHtml(sec.content) + '<\/div>';
  } else {
    bodyHtml = '<div class="card-body placeholder">' + (PLACEHOLDERS[key] || "Not yet completed") + '<\/div>';
  }
  return '<div class="card">' +
    '<div class="card-header">' +
      '<div class="card-num">' + num + '<\/div>' +
      '<div><div class="card-title">' + escapeHtml(sec.title) + '<\/div>' +
      '<div class="card-subtitle">' + escapeHtml(sec.subtitle) + '<\/div><\/div>' +
      '<div class="card-dot' + dotClass + '"><\/div>' +
    '<\/div>' + bodyHtml + '<\/div>';
}

function renderSections(data) {
  var left = document.getElementById("colLeft");
  var right = document.getElementById("colRight");
  left.innerHTML = "";
  right.innerHTML = "";
  SECTIONS_LEFT.forEach(function(k) { if (data.sections[k]) left.innerHTML += renderCard(k, data.sections[k]); });
  SECTIONS_RIGHT.forEach(function(k) { if (data.sections[k]) right.innerHTML += renderCard(k, data.sections[k]); });
}

function updateProgress(data) {
  var sectionKeys = SECTIONS_LEFT.concat(SECTIONS_RIGHT);
  var filledSections = sectionKeys.filter(function(k) { return data.sections[k] && data.sections[k].content && data.sections[k].content.trim().length > 0; }).length;
  var headerFields = ["project_title","owner","division","date"].filter(function(k) { return data[k] && data[k].trim().length > 0; }).length;
  var pct = Math.round(((filledSections + headerFields) / 11) * 100);
  var fill = document.getElementById("progressFill");
  fill.style.width = pct + "%";
  if (pct === 100) fill.classList.add("complete"); else fill.classList.remove("complete");
  document.getElementById("progressPct").textContent = pct + "%";
}

function renderROI(data) {
  var grid = document.getElementById("roiGrid");
  var roi = data.roi || {};
  var fields = [
    {key:"revenue_impact", label:"Revenue Impact", placeholder:"e.g. $50,000/year"},
    {key:"cost_savings", label:"Cost Savings", placeholder:"e.g. $25,000/year"},
    {key:"hours_saved", label:"Hours Saved", placeholder:"e.g. 8 hrs/week"},
    {key:"capacity_impact", label:"Capacity Impact", placeholder:"e.g. 50 \u2192 500 units/week"}
  ];
  var h = "";
  fields.forEach(function(f) {
    var val = roi[f.key] || "";
    if (val) {
      h += '<div class="roi-card"><div class="roi-card-label">' + f.label + '<\/div><div class="roi-card-value">' + escapeHtml(val) + '<\/div><\/div>';
    } else {
      h += '<div class="roi-card"><div class="roi-card-label">' + f.label + '<\/div><div class="roi-card-value empty">' + f.placeholder + '<\/div><\/div>';
    }
  });
  grid.innerHTML = h;
}

function renderAll(data) {
  document.title = (data.project_title || "A3 Report") + " \u2014 Patry AI Fellowship";
  renderMeta(data);
  renderROI(data);
  renderSections(data);
  updateProgress(data);
}

// Load data: use fetch when hosted, inline data when opened from file://
if (window.location.protocol === "file:") {
  renderAll(INLINE_DATA);
} else {
  fetch("a3-data.json")
    .then(function(r) { if (!r.ok) throw new Error("not found"); return r.json(); })
    .then(function(data) { renderAll(data); })
    .catch(function() { renderAll(INLINE_DATA); });
}
<\/script>
</body>
</html>
